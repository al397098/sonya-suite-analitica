<!DOCTYPE html>
<html lang="es" class="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONYA | Gestión de Base de Datos</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#004655", "secondary": "#00696c", "tertiary": "#8b3d97",
            "error": "#ba1a1a", "surface": "#f6fafe", "on-surface": "#171c1f",
            "outline": "#6f797c", "outline-variant": "#bfc8cc", "accent-purple": "#9333ea"
          },
          fontFamily: { "headline": ["Manrope", "sans-serif"], "body": ["Inter", "sans-serif"], "mono": ["JetBrains Mono", "monospace"] },
          borderRadius: { "xl": "0.5rem", "2xl": "0.75rem", "3xl": "1rem" },
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f6fafe;
      margin: 0;
    }

    .bp-grid {
      background-image: radial-gradient(#bfc8cc 0.5px, transparent 0.5px);
      background-size: 24px 24px;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 12px;
      font-family: 'Manrope';
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      color: #424752;
      text-decoration: none;
      transition: 0.2s;
    }

    .sidebar-link:hover {
      background: rgba(147, 51, 234, 0.06);
      color: #9333ea;
    }

    .sidebar-link.active {
      background: rgba(147, 51, 234, 0.1);
      color: #9333ea;
    }

    .toast {
      position: fixed;
      top: 76px;
      right: 24px;
      background: white;
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      animation: toastIn 0.3s ease;
      border: 1px solid #eee;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body class="antialiased flex min-h-screen">
  <div id="toast-wrap"></div>

  <aside
    class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 bg-[#f8faff] border-r border-slate-200/70 z-40">
    <div class="p-6 flex flex-col h-full">
      <div class="mb-10 cursor-pointer" onclick="location.href='../index.html'">
        <img src="logo_sonya.png" alt="SONYA" class="h-10 w-auto object-contain">
      </div>
      <nav class="space-y-1.5 flex-1">
        <a href="../index.html" class="sidebar-link"><span
            class="material-symbols-outlined">grid_view</span>Dashboard</a>
        <a href="gestion_bbdd.html" class="sidebar-link active"><span
            class="material-symbols-outlined fill-icon">database</span>BBDD</a>
        <a href="motor_mrp.html" class="sidebar-link"><span class="material-symbols-outlined">analytics</span>Motor
          MRP</a>
        <a href="motor_topsis.html" class="sidebar-link"><span class="material-symbols-outlined">insights</span>Motor
          TOPSIS</a>
      </nav>
    </div>
  </aside>

  <main class="md:ml-64 flex-1 flex flex-col min-h-screen">
    <header
      class="sticky top-0 z-30 w-full h-14 bg-white/80 backdrop-blur-xl border-b border-slate-200/60 flex justify-between items-center px-8 shadow-sm">
      <h2 class="font-headline font-extrabold text-lg tracking-tighter">Gestión de Base de Datos</h2>
      <div
        class="flex items-center gap-1.5 px-3 py-1.5 bg-green-50 text-green-700 rounded-full border border-green-200">
        <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-[10px] font-mono font-bold uppercase">Motor Local Activo</span>
      </div>
    </header>

    <div class="flex-1 bp-grid p-8 lg:p-10 max-w-7xl mx-auto w-full space-y-10">

      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <div class="bg-white p-6 rounded-xl shadow-sm border-b-2 border-accent-purple/30">
          <p class="text-[10px] font-mono uppercase text-slate-400">Total Acciones</p>
          <h3 class="text-4xl font-bold font-headline" id="metric-total">0</h3>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border-b-2 border-secondary/30">
          <p class="text-[10px] font-mono uppercase text-secondary/60">Acciones EX-ANTE</p>
          <h3 class="text-4xl font-bold font-headline text-secondary" id="metric-ante">0</h3>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border-b-2 border-primary/30">
          <p class="text-[10px] font-mono uppercase text-primary/60">Acciones EX-POST</p>
          <h3 class="text-4xl font-bold font-headline text-primary" id="metric-post">0</h3>
        </div>
      </div>

      <section class="bg-white rounded-2xl border border-outline-variant/10 shadow-xl overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
          <h4 class="font-headline font-bold text-xl flex items-center gap-2">
            <span class="material-symbols-outlined text-accent-purple">list_alt</span>Repositorio Maestro
          </h4>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr class="bg-slate-50 text-[10px] font-mono font-bold uppercase tracking-widest text-slate-500 border-b">
                <th class="px-6 py-4">Tipo</th>
                <th class="px-6 py-4">Acción</th>
                <th class="px-4 py-4 text-center">Amb</th>
                <th class="px-4 py-4 text-center">Soc</th>
                <th class="px-4 py-4 text-center">Eco</th>
                <th class="px-6 py-4 text-right">Acciones</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100" id="bbdd-table"></tbody>
          </table>
        </div>
      </section>

      <section class="bg-white rounded-2xl border border-tertiary/20 shadow-lg p-6 space-y-6">
        <div class="flex items-center gap-3 border-b pb-4">
          <span class="material-symbols-outlined text-tertiary">link</span>
          <h3 class="font-headline font-extrabold text-xl text-slate-800">Vinculación de Escenarios</h3>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Referencia (EX-ANTE)</label>
            <select id="vinc-ante"
              class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-tertiary/20"></select>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Asociar Mejora
              (EX-POST)</label>
            <select id="vinc-post"
              class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-tertiary/20"></select>
          </div>
          <button onclick="establecerVinculo()"
            class="bg-tertiary text-white h-12 rounded-xl font-bold hover:bg-purple-800 transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">add_link</span> Crear Vínculo
          </button>
        </div>
        <div id="lista-vinculos" class="flex flex-wrap gap-2 mt-2"></div>
      </section>

      <section class="bg-white rounded-3xl p-8 border border-slate-200 shadow-2xl">
        <h3 class="text-2xl font-black font-headline mb-8 flex items-center gap-2">
          <span class="material-symbols-outlined text-accent-purple">add_box</span>Nueva Acción
        </h3>
        <form onsubmit="crearAccion(event)" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="md:col-span-2">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Nombre</label>
            <input id="na-nom" type="text"
              class="w-full bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-accent-purple" required>
          </div>
          <div class="md:col-span-2">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Tipo</label>
            <select id="na-tipo"
              class="w-full bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-accent-purple">
              <option value="EX-POST">EX-POST (Mejora)</option>
              <option value="EX-ANTE">EX-ANTE (Base)</option>
            </select>
          </div>
          <div><label class="block text-[10px] font-bold text-teal-600 uppercase mb-2 ml-1">Amb</label><input
              id="na-amb" type="number" step="any"
              class="w-full bg-slate-50 border-none rounded-2xl p-4 font-mono font-bold text-teal-700"></div>
          <div><label class="block text-[10px] font-bold text-purple-600 uppercase mb-2 ml-1">Soc</label><input
              id="na-soc" type="number" step="any"
              class="w-full bg-slate-50 border-none rounded-2xl p-4 font-mono font-bold text-purple-700"></div>
          <div><label class="block text-[10px] font-bold text-primary uppercase mb-2 ml-1">Eco</label><input id="na-eco"
              type="number" step="any"
              class="w-full bg-slate-50 border-none rounded-2xl p-4 font-mono font-bold text-primary"></div>
          <div class="flex items-end">
            <button type="submit"
              class="w-full bg-slate-900 text-white h-[56px] rounded-2xl font-bold hover:bg-black transition-all">Guardar
              Registro</button>
          </div>
        </form>
      </section>

    </div>
  </main>

  <script>
    const SONYA_STORAGE_KEY = 'sonya_data_bbdd';

    // DATOS INICIALES (Solo si está vacío)
    const DATOS_INICIALES = [
      { nombre: "Microbus", tipo: "EX-ANTE", eco: 5920.13, amb: 68.38, soc: 960377.53 },
      { nombre: "Telematico", tipo: "EX-POST", eco: 431.63, amb: 5.73, soc: 77257.43 },
      { nombre: "Fruteria local", tipo: "EX-ANTE", eco: 0.71, amb: 193.53, soc: 481.19 },
      { nombre: "Fruta España", tipo: "EX-POST", eco: 0.92, amb: 261.46, soc: 576.56 }
    ];

    // Cargar de LocalStorage
    let DB_LOCAL = JSON.parse(localStorage.getItem(SONYA_STORAGE_KEY)) || DATOS_INICIALES;

    function saveDB() {
      localStorage.setItem(SONYA_STORAGE_KEY, JSON.stringify(DB_LOCAL));
    }

    function msg(txt, type = 'ok') {
      const w = document.getElementById('toast-wrap'), t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = `<span class="material-symbols-outlined" style="color:${type === 'err' ? 'red' : 'green'}">check_circle</span><p>${txt}</p>`;
      w.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // FORMATEO FORZANDO PUNTO (.)
    function fmtVal(v) {
      return `<span class="font-mono font-bold text-slate-700">${parseFloat(v).toFixed(2)}</span>`;
    }

    function loadBBDD() {
      const tb = document.getElementById('bbdd-table');
      const tA = DB_LOCAL.filter(x => x.tipo === 'EX-ANTE').length;
      const tP = DB_LOCAL.length - tA;

      document.getElementById('metric-total').innerText = DB_LOCAL.length;
      document.getElementById('metric-ante').innerText = tA;
      document.getElementById('metric-post').innerText = tP;

      tb.innerHTML = DB_LOCAL.map((a, idx) => `
        <tr class="hover:bg-slate-50 transition-colors group">
          <td class="px-6 py-4">
            <span class="px-2 py-0.5 rounded text-[9px] font-bold ${a.tipo === 'EX-ANTE' ? 'bg-slate-100 text-slate-500' : 'bg-purple-100 text-purple-600'}">${a.tipo}</span>
          </td>
          <td class="px-6 py-4">
            <div class="font-bold text-sm text-slate-800">${a.nombre}</div>
            ${a.vinculoAnte ? `<div class="flex items-center gap-1 text-[9px] font-bold text-purple-500 mt-1 uppercase"><span class="material-symbols-outlined text-[12px]">link</span>Ref: ${a.vinculoAnte}</div>` : ''}
          </td>
          <td class="px-4 py-4 text-center">${fmtVal(a.amb)}</td>
          <td class="px-4 py-4 text-center">${fmtVal(a.soc)}</td>
          <td class="px-4 py-4 text-center">${fmtVal(a.eco)}</td>
          <td class="px-6 py-4 text-right">
            <button onclick="delAccion('${a.nombre}')" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </td>
        </tr>
      `).join('');

      refreshVincSelectors();
    }

    function crearAccion(e) {
      e.preventDefault();
      const n = document.getElementById('na-nom').value;
      const t = document.getElementById('na-tipo').value;
      const amb = parseFloat(document.getElementById('na-amb').value) || 0;
      const soc = parseFloat(document.getElementById('na-soc').value) || 0;
      const eco = parseFloat(document.getElementById('na-eco').value) || 0;

      DB_LOCAL.push({ nombre: n, tipo: t, amb, soc, eco });
      saveDB();
      loadBBDD();
      e.target.reset();
      msg('Acción registrada correctamente');
    }

    function delAccion(nombre) {
      if (!confirm(`¿Eliminar ${nombre}?`)) return;
      DB_LOCAL = DB_LOCAL.filter(x => x.nombre !== nombre);
      saveDB();
      loadBBDD();
    }

    function refreshVincSelectors() {
      const sA = document.getElementById('vinc-ante'), sP = document.getElementById('vinc-post');
      const antes = DB_LOCAL.filter(x => x.tipo === 'EX-ANTE');
      const posts = DB_LOCAL.filter(x => x.tipo === 'EX-POST');

      sA.innerHTML = antes.map(x => `<option value="${x.nombre}">${x.nombre}</option>`).join('');
      sP.innerHTML = posts.map(x => `<option value="${x.nombre}">${x.nombre}</option>`).join('');
      renderVinculosUI();
    }

    function establecerVinculo() {
      const a = document.getElementById('vinc-ante').value;
      const p = document.getElementById('vinc-post').value;
      const idx = DB_LOCAL.findIndex(x => x.nombre === p);
      if (idx !== -1) {
        DB_LOCAL[idx].vinculoAnte = a;
        saveDB();
        loadBBDD();
        msg('Vínculo creado');
      }
    }

    function renderVinculosUI() {
      const cont = document.getElementById('lista-vinculos');
      const vins = DB_LOCAL.filter(x => x.vinculoAnte);
      cont.innerHTML = vins.map(x => `
        <div class="flex items-center gap-2 bg-purple-50 border border-purple-100 px-3 py-1 rounded-full text-[10px] font-bold text-purple-700">
          ${x.nombre} → ${x.vinculoAnte}
          <button onclick="quitarVinc('${x.nombre}')" class="hover:text-red-500">×</button>
        </div>
      `).join('');
    }

    function quitarVinc(n) {
      const idx = DB_LOCAL.findIndex(x => x.nombre === n);
      delete DB_LOCAL[idx].vinculoAnte;
      saveDB();
      loadBBDD();
    }

    window.onload = loadBBDD;
  </script>
</body>

</html>
